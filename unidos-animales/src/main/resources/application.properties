# ===============================
# CONEXIÓN A BASE DE DATOS MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3308/unidos_animales?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# ===============================
#Seguridad de cookies (se visualizo la vulnerabilidad de seguridad de cookies, se agrego esta linea para solucionarlo (ZAP))
# ===============================
server.servlet.session.cookie.same-site=strict

# ===============================
# Configuración de seguimiento de sesiones
# ===============================
server.servlet.session.tracking-modes=cookie

# ===============================
# HARDENING DEL SERVIDOR TOMCAT
# ===============================
# 1. Ocultar la versión del servidor en las respuestas (Evita que busquen vulnerabilidades específicas)
server.server-header=UnidosAnimales-Server

# 2. Ocultar el rastro de errores (Stacktrace) en la web (Evita fuga de información del código)
server.error.include-stacktrace=never
server.error.include-message=never

# 3. Prevenir ataques de denegación de servicio (Slowloris/DDoS) limitando los tiempos de espera
server.tomcat.connection-timeout=5000
server.tomcat.keep-alive-timeout=5000

# 4. Limitar el tamaño máximo de las peticiones para evitar que saturen la memoria
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB